name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: ./Backend
        run: npm ci

      - name: Run unit tests
        working-directory: ./Backend
        run: npm test

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd ~/Url-Shortener

            # Ensure .env exists before deploying
            if [ ! -f .env ]; then
              echo "ERROR: .env file is missing. Aborting deploy."
              exit 1
            fi

            # Pull the latest code from GitHub
            git pull origin main

            # Build new images and restart containers (Docker Compose v2)
            docker compose -f docker-compose.prod.yml up -d --build

            # Clean up dangling images only (not all unused images, to allow quick rollback)
            docker image prune -f
